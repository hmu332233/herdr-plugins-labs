id = "dev.minung.quick-agent"
name = "Quick Agent"
version = "0.2.0"
min_herdr_version = "0.7.4"
description = "Launch Codex or Claude beside the launch origin pane."
platforms = ["linux", "macos"]

[[actions]]
id = "open"
title = "Open Quick Agent"
contexts = ["workspace"]
command = ["node", "src/open.mjs"]

[[panes]]
id = "quick-agent"
title = "Quick Agent"
placement = "popup"
width = 44
height = 10
command = ["node", "src/launcher.mjs"]
